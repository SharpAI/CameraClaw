# CameraClaw — OpenClaw Docker Compose
# Manages OpenClaw instances with virtual desktop for monitoring.
# The openclaw:local image is built by deploy.sh with desktop packages included.

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DISPLAY: ":99"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_VNC_PORT:-5900}:5900"
      - "${OPENCLAW_NOVNC_PORT:-6080}:6080"
    init: true
    restart: unless-stopped
    shm_size: "512m"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start virtual display
        Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
        sleep 2

        # Start window manager (fluxbox — lightweight)
        fluxbox -display :99 &
        sleep 1

        # Start VNC server
        x11vnc -display :99 -nopw -noxdamage -shared -forever -rfbport 5900 -bg -o /tmp/x11vnc.log

        # Start noVNC websocket proxy
        websockify 6080 localhost:5900 &

        # Start a terminal on the desktop
        DISPLAY=:99 xterm -geometry 100x30+10+10 -fa 'Monospace' -fs 12 &

        # Start OpenClaw gateway (headless, runs as API server)
        openclaw gateway \
          --bind "${OPENCLAW_GATEWAY_BIND:-lan}" \
          --port 18789 \
          --allow-unconfigured &
        GATEWAY_PID=$!

        # Wait for gateway to be ready, then open it in browser
        sleep 3
        DISPLAY=:99 chromium \
          --no-sandbox \
          --disable-gpu \
          --disable-dev-shm-usage \
          --no-first-run \
          --disable-extensions \
          --window-size=1260,680 \
          --window-position=10,10 \
          "http://localhost:18789" &

        # Keep container alive — wait for gateway process
        wait $GATEWAY_PID

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
