# CameraClaw — OpenClaw Docker Compose
# Manages OpenClaw instances with virtual desktop for monitoring.
# Env vars are set by monitor.js per instance.

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DISPLAY: ":99"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_VNC_PORT:-5900}:5900"
      - "${OPENCLAW_NOVNC_PORT:-6080}:6080"
    init: true
    restart: unless-stopped
    user: root
    shm_size: "512m"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Install desktop packages if not already present
        if ! command -v Xvfb >/dev/null 2>&1; then
          apt-get update -qq && \
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            xvfb x11vnc websockify imagemagick xdg-utils >/dev/null 2>&1
          rm -rf /var/lib/apt/lists/*
        fi

        # Start virtual display
        Xvfb :99 -screen 0 1280x720x24 -ac &
        sleep 1

        # Start VNC server (no password, shared mode for multiple viewers)
        x11vnc -display :99 -nopw -shared -forever -rfbport 5900 -bg

        # Start noVNC websocket proxy
        websockify --web /usr/share/novnc 6080 localhost:5900 &

        # Drop back to node user for the gateway
        exec su -s /bin/sh node -c "node dist/index.js gateway \
          --bind ${OPENCLAW_GATEWAY_BIND:-lan} \
          --port 18789"

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
