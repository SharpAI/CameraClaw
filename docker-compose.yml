# CameraClaw — OpenClaw Docker Compose
# Manages OpenClaw instances with virtual desktop for monitoring.
# The openclaw:local image is built by deploy.sh with KasmVNC + desktop packages.

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    pull_policy: never
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DISPLAY: ":99"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_KASMVNC_PORT:-6080}:6080"
    init: true
    restart: unless-stopped
    shm_size: "512m"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start virtual display
        Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
        sleep 2

        # Start XFCE4 desktop session (Windows-like panel + window manager)
        DISPLAY=:99 dbus-launch --exit-with-session startxfce4 &
        sleep 3

        # Start KasmVNC (integrated VNC server + web client on port 6080)
        /usr/bin/kasmvncserver :99 \
          -geometry 1280x720 \
          -websocketPort 6080 \
          -disableBasicAuth \
          -FrameRate 30 \
          -interface 0.0.0.0 &
        sleep 2

        # Create OpenClaw config to allow host-header origin fallback
        # (Required when binding to 0.0.0.0 for Docker port mapping)
        mkdir -p /home/node/.openclaw
        cat > /home/node/.openclaw/openclaw.json << 'CFGEOF'
        {
          "gateway": {
            "controlUi": {
              "dangerouslyAllowHostHeaderOriginFallback": true
            }
          }
        }
        CFGEOF

        # Create desktop shortcut to OpenClaw Control UI (with auth token)
        GATEWAY_URL="http://localhost:18789"
        TOKEN="${OPENCLAW_GATEWAY_TOKEN}"
        mkdir -p /home/node/Desktop
        cat > /home/node/Desktop/OpenClaw.desktop << SHORTCUT
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=OpenClaw Control
        Comment=Open the OpenClaw Control UI
        Icon=web-browser
        Exec=chromium --no-sandbox --disable-gpu "${GATEWAY_URL}?token=${TOKEN}"
        Terminal=false
        Categories=Network;WebBrowser;
        SHORTCUT
        chmod +x /home/node/Desktop/OpenClaw.desktop

        # Start OpenClaw gateway in a terminal (logs visible on desktop)
        DISPLAY=:99 xfce4-terminal --geometry=120x25+10+10 \
          --title="OpenClaw Gateway" \
          -e "openclaw gateway --bind lan --port 18789 --allow-unconfigured" &

        # Wait for gateway to start, then auto-open Chromium to OpenClaw
        sleep 5
        DISPLAY=:99 chromium --no-sandbox --disable-gpu \
          --start-maximized \
          "${GATEWAY_URL}?token=${TOKEN}" &

        # Keep container alive
        wait

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
