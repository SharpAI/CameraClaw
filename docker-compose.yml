# CameraClaw — OpenClaw Docker Compose
# Manages OpenClaw instances with virtual desktop for monitoring.
# The openclaw:local image is built by deploy.sh with desktop packages included.

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    pull_policy: never
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DISPLAY: ":99"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "${OPENCLAW_VNC_PORT:-5900}:5900"
      - "${OPENCLAW_NOVNC_PORT:-6080}:6080"
    init: true
    restart: unless-stopped
    shm_size: "512m"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start virtual display
        Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
        sleep 2

        # Start window manager (fluxbox — lightweight)
        fluxbox -display :99 &
        sleep 1

        # Start VNC server
        x11vnc -display :99 -nopw -noxdamage -shared -forever -rfbport 5900 -bg -o /tmp/x11vnc.log

        # Start noVNC websocket proxy
        websockify 6080 localhost:5900 &

        # Create OpenClaw config to allow host-header origin fallback
        # (Required when binding to 0.0.0.0 for Docker port mapping)
        mkdir -p /home/node/.openclaw
        cat > /home/node/.openclaw/openclaw.json << 'CFGEOF'
        {
          "gateway": {
            "controlUi": {
              "dangerouslyAllowHostHeaderOriginFallback": true
            }
          }
        }
        CFGEOF

        # Start OpenClaw gateway inside a terminal (logs visible on desktop)
        # Bind to 0.0.0.0 so Docker port mapping works from host
        DISPLAY=:99 xterm -geometry 120x35+10+10 -fa 'Monospace' -fs 11 \
          -title "OpenClaw Gateway" \
          -e "openclaw gateway --bind lan --port 18789 --allow-unconfigured" &

        # Keep container alive
        wait

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
